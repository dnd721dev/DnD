<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#7c2d12" stroke="#fb923c" stroke-width="2"/>
  <circle cx="32" cy="32" r="26" fill="url(#bg)" opacity="0.9"/>
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fed7aa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6b1a05" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- hood shadow -->
  <ellipse cx="32" cy="20" rx="20" ry="12" fill="#1c0a00" opacity="0.7"/>
  <!-- face -->
  <ellipse cx="32" cy="34" rx="14" ry="16" fill="#d97706"/>
  <!-- bandana / mask covering lower face -->
  <rect x="18" y="36" width="28" height="14" rx="3" fill="#1c1917"/>
  <!-- eyes -->
  <ellipse cx="25" cy="31" rx="4" ry="4.5" fill="#fef3c7"/>
  <ellipse cx="39" cy="31" rx="4" ry="4.5" fill="#fef3c7"/>
  <circle cx="26" cy="32" r="2.5" fill="#1a0a00"/>
  <circle cx="40" cy="32" r="2.5" fill="#1a0a00"/>
  <circle cx="27" cy="31" r="1" fill="white"/>
  <circle cx="41" cy="31" r="1" fill="white"/>
  <!-- scar -->
  <path d="M38 25 L42 34" stroke="#7c2d12" stroke-width="1.5" stroke-linecap="round"/>
  <!-- dagger hilt visible at shoulder -->
  <rect x="44" y="38" width="4" height="8" rx="1" fill="#78716c"/>
  <rect x="42" y="39" width="8" height="2" rx="1" fill="#a8a29e"/>
</svg>
