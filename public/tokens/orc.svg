<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#991b1b" stroke="#f87171" stroke-width="2"/>
  <circle cx="32" cy="32" r="26" fill="url(#og)" opacity="0.9"/>
  <defs>
    <radialGradient id="og" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- thick brow ridge -->
  <ellipse cx="32" cy="22" rx="16" ry="5" fill="#450a0a"/>
  <!-- face -->
  <ellipse cx="32" cy="35" rx="16" ry="17" fill="#b45309" opacity="0.9"/>
  <!-- heavy brow -->
  <path d="M16 24 Q24 20 32 22 Q40 20 48 24" stroke="#1c0a00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- eyes — deep-set and angry -->
  <ellipse cx="24" cy="30" rx="5" ry="4" fill="#fef9c3"/>
  <ellipse cx="40" cy="30" rx="5" ry="4" fill="#fef9c3"/>
  <circle cx="25" cy="31" r="3" fill="#1a0a00"/>
  <circle cx="41" cy="31" r="3" fill="#1a0a00"/>
  <circle cx="26" cy="30" r="1.2" fill="white"/>
  <circle cx="42" cy="30" r="1.2" fill="white"/>
  <!-- flat nose -->
  <ellipse cx="32" cy="38" rx="5" ry="3.5" fill="#7c2d12"/>
  <circle cx="29" cy="38" r="2" fill="#450a0a"/>
  <circle cx="35" cy="38" r="2" fill="#450a0a"/>
  <!-- lower tusks -->
  <path d="M22 44 Q32 50 42 44" stroke="#854d0e" stroke-width="2" fill="none"/>
  <line x1="26" y1="44" x2="24" y2="52" stroke="#fef9c3" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="44" x2="40" y2="52" stroke="#fef9c3" stroke-width="3" stroke-linecap="round"/>
  <!-- war paint -->
  <line x1="16" y1="32" x2="24" y2="34" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="40" y2="34" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
</svg>
